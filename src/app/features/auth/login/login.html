<div class="login-container">
  <div class="login-content-wrapper">

    <div class="left-panel">
      <h1 class="system-title">Intern Task Management System</h1>
      <div class="vector-image-wrapper">
        <img src="pageLogin.jpg" alt="logo image">
      </div>
    </div>

    <div class="right-panel">
      
      <div class="login-card">

        <h2 class="login-title">Login</h2>
        
        <form (ngSubmit)="onLogin()">

          <div class="form-group">
            <input type="email" name="email" [(ngModel)]="loginData.email" placeholder="Your Email" required>
          </div>

          <div class="form-group">
            <input type="password" name="password" [(ngModel)]="loginData.password" placeholder="Your Password" required>
          </div>

          <div class="form-options">
            <label class="checkbox-container"><input type="checkbox"> Remember</label>
          </div>

          <button type="submit" class="btn-login">Log in</button>

        </form>

      </div>
    </div>

  </div>
</div>
