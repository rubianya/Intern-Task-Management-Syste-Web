 <div class="main-body">

  <main class="dashboard-content">
    <div class="edit-profile-container">
      <div class="profile-card">
          
        <div class="card-header">
          <h2>Edit Profile</h2>
          <p>Manage your account settings and personal information.</p>
        </div>

        <div class="card-body">
            
          <div class="avatar-section">
            <div class="avatar-circle">
              <i class="fi fi-sr-user"></i>
            </div>
            <div class="avatar-text">
              <h3>{{ displayFullName }}</h3>
              <p>{{ displayEmail }}</p>
            </div>
          </div>

          <div class="divider"></div>

          <form class="profile-form" (ngSubmit)="saveProfile()">
              
            <div class="form-group">
              <label>Full Name</label>
              <input type="text" name="fullName" [(ngModel)]="editFullName" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
              <label>Email Address</label>
              <input type="email" name="email" [(ngModel)]="editEmail" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
              <label>Role (Read Only)</label>
              <input type="text" class="input-disabled" name="role" [(ngModel)]="role" disabled>
            </div>

            <div class="form-actions">
              <button type="button" class="btn-cancel" (click)="cancel()">Cancel</button>
              <button type="submit" class="btn-save">Save Changes</button>
            </div>

          </form>
        </div>
      </div>
    </div>
  </main>
</div>
