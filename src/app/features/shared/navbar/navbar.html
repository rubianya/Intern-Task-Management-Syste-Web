<mat-toolbar class="top-navbar">
  <div class="navbar-brand">
    <mat-icon class="navbar-mobile-icon">assignment_turned_in</mat-icon>
    <span class="system-title">Intern Task Management System</span>
  </div>
  
  <span class="spacer"></span> 

  <div class="profile-dropdown-container">
    <button mat-button [matMenuTriggerFor]="profileMenu" class="user-profile-nav">
      <mat-icon class="nav-icon-start">person</mat-icon>
      <span class="user-display-name">{{ UserName || 'Loading...' }}</span>
      <mat-icon class="nav-icon-middle">arrow_drop_down</mat-icon>
    </button>

    <mat-menu #profileMenu="matMenu" class="custom-profile-menu" xPosition="before">
      <div class="dropdown-profile-header" (click)="$event.stopPropagation()">
        <div class="dropdown-large-avatar">
          <mat-icon class="large-avatar-icon">person</mat-icon>
        </div>
        <div class="dropdown-user-info">
          <span class="dropdown-name">{{ UserName }}</span>
          <span class="dropdown-email">{{ UserEmail }}</span>
          <button mat-flat-button color="primary" class="btn-edit-profile" (click)="goToEditProfile()">Edit profile</button>
        </div>
      </div>
      
      <mat-divider></mat-divider>

      <button mat-menu-item (click)="logout()">
        <mat-icon>logout</mat-icon>
        <span>Logout</span>
      </button>
    </mat-menu>
  </div>
</mat-toolbar>
