<header class="top-navbar">
  <div class="navbar-brand">
    <span class="system-title">Intern Task Management System</span>
  </div>
  
  <div class="profile-dropdown-container">
    <div class="user-profile-nav" (click)="toggleDropdown($event)" role="button" tabindex="0">
      <div class="user-avatar">
        <i class="fi fi-sr-user"></i>
      </div>
      <span class="user-display-name">{{ UserName || 'Loading...' }}</span>
      <span class="dropdown-icon"></span>
    </div>

    @if (isDropdownOpen) {
      <div class="profile-dropdown-menu" (click)="$event.stopPropagation()">
        <div class="dropdown-profile-header">
          <div class="dropdown-large-avatar">
            <i class="fi fi-sr-user"></i>
          </div>
          <div class="dropdown-user-info">
            <span class="dropdown-name">{{ UserName }}</span>
            <span class="dropdown-email">{{ UserEmail }}</span>
            <button class="btn-edit-profile" (click)="goToEditProfile()">Edit profile</button>
          </div>
        </div>
        
        <div class="dropdown-divider"></div>

        <ul class="dropdown-links">
          <li (click)="logout()">
            <i class="fi fi-sr-sign-out-alt"></i>
            <span> Logout</span>
          </li>
        </ul>
      </div>
    }
  </div>
</header>
